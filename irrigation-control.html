<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<body>
  <div id="head_1">
        <nav id="nav_1">

                <img src ="images/Veyora.png" alt="veyora-logo"><span class="logo_text">Veyora</span>
            </a>

                <a href="index.html">HOME</a>
            </div>
            <div class="menu-toggle">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-menu-icon lucide-menu"><path d="M4 5h16"/><path d="M4 12h16"/><path d="M4 19h16"/></svg>
            </div>
        </nav>
    </div>
  <div class="head">
    <div class="header">
      <div class="userBox">
                <i class="fa-solid fa-user"></i>
                <span id="loggedUser"></span>
            </div>
      <div class="lang">
        <select id="languageSelect" class="langSelect" onchange="changeLanguage()">
          <option value="en">English</option>
          <option value="hi">हिन्दी</option>
          <option value="gu">ગુજરાતી</option>
          <option value="mr">मराठी</option>
          <option value="bn">বাংলা</option>
        </select>
      </div>
      <div class="head1">
        <h1 id="head1">IRRIGATION CONTROL</h1>
      </div>
    </div>
    <nav class="navbar">
            <ul class="navList">
                <li><a href="irrigation-dashboard.html">Dashboard</a></li>
                <li><a href="index.html" class="active">Control</a></li>
                <li><a href="#" class="btn3" id="logoutBtn" onclick="logout()">Logout</a></li>
            </ul>           
        </nav>
    <div class="control">
      <div class="radio-group">
        <span id="modeLabel">Mode :</span>
        <label>
          <input type="radio" name="mode" id="auto" value="AUTO">
            <span id="autoText">Auto</span>
        </label>
        <label>
          <input type="radio" name="mode" id="manual" value="MANUAL">
            <span id="manualText">Manual</span>
        </label>
      </div>
      <div id="options" class="options">
        <div class="cropDiv"><label for="crops" id="cropLabel">Choose a crop:</label>
          <select id="crop" class="crop">
            <option class="opt" value="" disabled selected></option>
            <option class="opt" value="Groundnut">Groundnut</option>
            <option class="opt" value="Cotton">Cotton</option>
            <option class="opt" value="Wheat">Wheat</option>
            <option class="opt" value="Bajra">Bajra</option>
            <option class="opt" value="Rice">Rice</option>
            <option class="opt" value="Castor">Castor</option>
            <option class="opt" value="Mustard">Mustard</option>
            <option class="opt" value="Cumin">Cumin</option>
            <option class="opt" value="Sugarcane">Sugarcane</option>
          </select>
          </div>
        <div class="timeDiv">
          <label for="time" id="timeLabel">Set time :</label>
          <select id="time" class="time">
            <option class="opt" value="" disabled selected></option>
            <option class="opt" value="15">15 min</option>
            <option class="opt" value="30">30 min</option>
            <option class="opt" value="45">45 min</option>
            <option class="opt" value="60">60 min</option>
            <option class="opt" value="75">75 min</option>
            <option class="opt" value="90">90 min</option>
            <option class="opt" value="105">105 min</option>
            <option class="opt" value="120">120 min</option>
            <option class="opt" value="135">135 min</option>
            <option class="opt" value="150">150 min</option>
            <option class="opt" value="165">165 min</option>
            <option class="opt" value="180">180 min</option>
          </select>
        </div>
        <div class="daysDiv">
          <label for="days" id="daysLabel">Set interval :</label>
          <select id="days" class="days">
            <option class="opt" value="" disabled selected></option>
            <option class="opt" value="1">1 Day</option>
            <option class="opt" value="2">2 Days</option>
            <option class="opt" value="3">3 Days</option>
            <option class="opt" value="4">4 Days</option>
            <option class="opt" value="5">5 Days</option>
            <option class="opt" value="6">6 Days</option>
            <option class="opt" value="7">7 Days</option>
            <option class="opt" value="8">8 Days</option>
            <option class="opt" value="9">9 Days</option>
            <option class="opt" value="10">10 Days</option>
            <option class="opt" value="11">11 Days</option>
            <option class="opt" value="12">12 Days</option>
            <option class="opt" value="13">13 Days</option>
            <option class="opt" value="14">14 Days</option>
            <option class="opt" value="15">15 Days</option>
            <option class="opt" value="16">16 Days</option>
            <option class="opt" value="17">17 Days</option>
            <option class="opt" value="18">18 Days</option>
            <option class="opt" value="19">19 Days</option>
            <option class="opt" value="20">20 Days</option>
          </select>
        </div>
      </div>
      <div class="radio-group">
        <span id="pumpLabel">Pump :</span>
        <label>
          <input type="radio" name="pump" value="ON">
          <span id="onText">ON</span>
        </label>
        <label>
          <input type="radio" name="pump" value="OFF">
          <span id="offText">OFF</span>
      </label>
      </div>
      <div class="btn01">
        <button type="button" class="btn1" id="confirmBtn" onclick="sendCrop()">Confirm</button>
      </div>
      <div class="btn02">
        <button type="button" class="btn2" value = "stop" id="stopBtn" onclick="stop()">EMERGENCY STOP</button>
      </div>
      <div id="msgBox"></div> 
      </div>
    </div>
   <footer class="footer">
        <div class="footer_bottom">
            <a href="index.html" class="foot_logo">
                <img src="images/Veyora.png" alt="veyora-logo"><span class="logo_text">Veyora</span>
            </a>
            <span class="rights">
                © 2026 Veyora. All Rights Reserved.
            </span>
        </div>

    <script>
        function copyEmail() {
        navigator.clipboard.writeText("virajdabhi910@gmail.com")
            .then(() => {
                alert("Email copied to clipboard!");
            })
            .catch(err => {
                console.error("Failed to copy:", err);
            });
    }
    const menuToggle = document.querySelector(".menu-toggle");
    const navLinks = document.querySelector(".link_1");
    menuToggle.addEventListener("click",()=>{
        navLinks.classList.toggle("active");
    });
    const dropdowns = document.querySelectorAll('.dropdown');
    dropdowns.forEach((dropdown) => {
        const trigger = dropdown.querySelector('a');
        trigger.addEventListener('click', (e) => {
            if(window.innerWidth > 768) return;
            e.preventDefault();
            const isOpen = dropdown.classList.contains('open');
            dropdowns.forEach(item => {
                item.classList.remove('open');
            });
            if(!isOpen){
                dropdown.classList.add('open');
            }
        });
    });
    </script> 
    <script src="script.js"></script>
   </body>
</html>
