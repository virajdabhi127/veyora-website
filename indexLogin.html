<!DOCTYPE html>
<html lang="en">
<head>
    <title>LOGIN</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stylesheetL.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
</head>
<body>
    <div id="head_1">
        <nav id="nav_1">
            <a href="index.html" class="logo">
                <img src ="images/Veyora.png" alt="veyora-logo"><span class="logo_text">Veyora</span>
            </a>
            <div class="link_1">
                <a href="index.html">HOME</a>
            </div>
        </nav>
    </div>
    <form id="loginForm">
        <div class="main">
            <div class="head">
                <div class="lang">
                    <select id="languageSelect" class="langSelect" onchange="changeLanguage()">
                        <option value="en">English</option>
                        <option value="hi">हिन्दी</option>
                        <option value="gu">ગુજરાતી</option>
                        <option value="mr">मराठी</option>
                        <option value="bn">বাংলা</option>
                    </select>
                </div>
                <h1 class="title">VEYORA LOGIN</h1>
            </div>
            <div class="credits">
                <div class="id">
                    <label for="user" id="labelid">Enter User ID :</label>
                    <input  class="userId" type="text" id="userid" name="user">
                </div>
                <div class="pass">
                    <label for="password" id="labelpass">Enter Password :</label>
                    <input class="ps" type="password" id="password" name="password">
                </div>
            </div>
            <div class="btn1">
                <button type="submit" class="btn" id="loginBtn">Login</button>
            </div>
        </div>
</form>
    <script>
        const API = window.location.hostname === "localhost"
            ? "http://localhost:5000"
            : "https://irrigation-backend-2m4h.onrender.com";
        // const API = "http://localhost:5000";
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const username = document.getElementById("userid").value.trim();
        const password = document.getElementById("password").value.trim();
        if (!username || !password) {
            alert("Invalid credentials");
            return;
        }
        try {
            const response = await fetch(API + "/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            if (response.ok) {
                sessionStorage.setItem("token", data.token);
                window.location.replace("irrigation-dashboard.html");
            } else {
                alert(data.message);
            }
            } catch (error) {
                alert("Server error");
            }
        });
        const translations = {
        en: {
            idLabel: "Enter User ID",
            passLabel: "Enter Password",
            loginBtn: "Login"
        },
        hi: {
            idLabel: "यूज़र आईडी दर्ज करें",
            passLabel: "पासवर्ड दर्ज करें",
            loginBtn: "लॉगिन"
        },
        gu: {
            idLabel: "યૂઝર આઈડી દાખલ કરો",
            passLabel: "પાસવર્ડ દાખલ કરો",
            loginBtn: "લોગિન"
        },
        mr: {
            idLabel: "यूजर आयडी टाका",
            passLabel: "पासवर्ड टाका",
            loginBtn: "लॉगिन"
        },
        bn: {
            idLabel: "ইউজার আইডি লিখুন",
            passLabel: "পাসওয়ার্ড লিখুন",
            loginBtn: "লগইন"
        }
        };
        function changeLanguage() {
        const lang = document.getElementById("languageSelect").value;
        localStorage.setItem("lang", lang); 
        const idLabel = document.getElementById("labelid");
        const passLabel = document.getElementById("labelpass");
        const loginBtn = document.getElementById("loginBtn");
        if (idLabel) idLabel.innerText = translations[lang].idLabel;
        if (passLabel) passLabel.innerText = translations[lang].passLabel;
        if (loginBtn) loginBtn.innerText = translations[lang].loginBtn;
        }
        window.onload = function() {
        const savedLang = localStorage.getItem("lang") || "en";
        document.getElementById("languageSelect").value = savedLang;
        changeLanguage();
        };
</script>
</body>
</html>
